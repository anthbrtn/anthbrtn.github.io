name: Deploy Astro Site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # default value when not using subfolders
  ASTRO_PATH: "./new_site" # path to the Astro site

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ env.ASTRO_PATH }}

      - name: Install dependencies
        run: |
          cd ${{ env.ASTRO_PATH }}
          npm install

      - name: Build Astro site
        run: |
          cd ${{ env.ASTRO_PATH }}
          npm run build

      # Copy the built site to the root of the repository
      - name: Prepare for deployment
        run: |
          # Remove all files except .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          # Copy built site to root
          cp -r ${{ env.ASTRO_PATH }}/../_site/* .
          # Add .nojekyll file to prevent Jekyll processing
          touch .nojekyll

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --staged --quiet || git commit -m "Deploy Astro site [skip ci]"
          git push