---
layout: default
---
<h1 class="font-mono text-2xl uppercase font-extrabold mb-4">{{ page.title }}</h1>
<div class="font-mono text-xs text-gray-500 mb-8 uppercase">{{ page.date | date: "%B %d, %Y" }}</div>

<!-- Simple TOC placeholder for brutalist style -->
<div class="border-2 border-black p-4 mb-8 font-mono text-sm bg-gray-50 uppercase">
    <div class="font-bold border-b-2 border-black mb-2 pb-2">Table of Contents</div>
    {{ content | toc }}
</div>

<div class="prose max-w-none">
    {{ content }}
</div>
